name: Build and Deploy Jekyll

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Generate search index
        run: |
          ruby -e "
          require 'json'
          require 'yaml'

          items = []

          Dir.glob('_posts/*.md').each do |f|
            content = File.read(f)
            fm = YAML.safe_load(content.split('---')[1]) rescue {}
            items << {
              title: fm['title'].to_s,
              desc: content.gsub(/---.*?---/m, '').gsub(/[#*\[\]`]/, '').strip[0..120],
              url: '/blog/' + File.basename(f, '.md').gsub(/^\d{4}-\d{2}-\d{2}-/, '').gsub('-', '/') + '/',
              section: 'Blog',
              tags: Array(fm['tags']).join(', ')
            }
          end

          Dir.glob('_writeups/*.md').each do |f|
            content = File.read(f)
            fm = YAML.safe_load(content.split('---')[1]) rescue {}
            items << {
              title: fm['title'].to_s,
              desc: fm['description'].to_s,
              url: '/writeups/' + File.basename(f, '.md') + '/',
              section: 'Writeup',
              tags: Array(fm['tags']).join(', ')
            }
          end

          Dir.glob('_notes/*.md').each do |f|
            content = File.read(f)
            fm = YAML.safe_load(content.split('---')[1]) rescue {}
            items << {
              title: fm['title'].to_s,
              desc: content.gsub(/---.*?---/m, '').gsub(/[#*\[\]`]/, '').strip[0..120],
              url: '/notes/' + File.basename(f, '.md') + '/',
              section: 'Nota',
              tags: Array(fm['tags']).join(', ')
            }
          end

          File.write('_site/search.json', JSON.generate(items))
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4