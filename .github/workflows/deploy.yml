name: Build and Deploy Jekyll

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Generate search index
        run: |
          ruby -e "
          require 'json'

          items = []

          Dir.glob('_posts/*.md').each do |f|
            content = File.read(f)
            parts = content.split('---')
            next if parts.length < 3
            fm = {}
            parts[1].scan(/^(\w+):\s*(.+)$/) { |k,v| fm[k] = v.strip.gsub(/^[\"']|[\"']$/, '') }
            body = parts[2..-1].join('---').gsub(/[#*\`\[\]]/, '').strip
            date = File.basename(f)[0..9].gsub('-', '/')
            slug = File.basename(f, '.md')[11..-1]
            items << {
              title: fm['title'].to_s,
              desc: body[0..120],
              url: \"/blog/#{date}/#{slug}/\",
              section: 'Blog',
              tags: fm['tags'].to_s
            }
          end

          Dir.glob('_writeups/*.md').each do |f|
            content = File.read(f)
            parts = content.split('---')
            next if parts.length < 3
            fm = {}
            parts[1].scan(/^(\w+):\s*(.+)$/) { |k,v| fm[k] = v.strip.gsub(/^[\"']|[\"']$/, '') }
            slug = File.basename(f, '.md')
            items << {
              title: fm['title'].to_s,
              desc: fm['description'].to_s,
              url: \"/writeups/#{slug}/\",
              section: 'Writeup',
              tags: fm['tags'].to_s
            }
          end

          Dir.glob('_notes/*.md').each do |f|
            content = File.read(f)
            parts = content.split('---')
            next if parts.length < 3
            fm = {}
            parts[1].scan(/^(\w+):\s*(.+)$/) { |k,v| fm[k] = v.strip.gsub(/^[\"']|[\"']$/, '') }
            body = parts[2..-1].join('---').gsub(/[#*\`\[\]]/, '').strip
            slug = File.basename(f, '.md')
            items << {
              title: fm['title'].to_s,
              desc: body[0..120],
              url: \"/notes/#{slug}/\",
              section: 'Nota',
              tags: fm['tags'].to_s
            }
          end

          File.write('_site/search.json', JSON.generate(items))
          puts 'Generated ' + items.length.to_s + ' items'
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4